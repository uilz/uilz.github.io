<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">

<style>
  :root {
    --bg: #ffffff;
    --text: #1f2328;
    --border: #d0d7de;
    --code-bg: #f6f8fa;
    --blockquote-border: #d0d7de;
    --link: #0969da;
    --heading: #1f2328;
    --table-header-bg: #f6f8fa;
    --table-alt-bg: #f8f9fa;
    --hr: #d0d7de;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
    padding: 40px;
    max-width: 840px;
    margin: 0 auto;
  }
  /* ── 标题 ── */
  h1, h2, h3, h4, h5, h6 {
    margin-top: 1.4em;
    margin-bottom: 0.6em;
    font-weight: 600;
    line-height: 1.3;
    color: var(--heading);
  }
  h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
  h3 { font-size: 1.25em; }
  h4 { font-size: 1em; }
  /* ── 段落 ── */
  p { margin-bottom: 1em; }
  /* ── 链接 ── */
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  /* ── 列表 ── */
  ul, ol { margin-bottom: 1em; padding-left: 2em; }
  li { margin-bottom: 0.25em; }
  li > p { margin-bottom: 0.25em; }
  /* ── 代码 ── */
  code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.88em;
    background-color: var(--code-bg);
    padding: 0.15em 0.4em;
    border-radius: 4px;
  }
  pre {
    margin-bottom: 1em;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    line-height: 1.45;
  }
  pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
    white-space: pre;
  }
  /* ── 引用 ── */
  blockquote {
    margin: 0 0 1em;
    padding: 0 1em;
    color: #656d76;
    border-left: 0.25em solid var(--blockquote-border);
  }
  blockquote p { margin-bottom: 0.5em; }
  /* ── 表格 ── */
  table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 1em;
    display: block;
    overflow-x: auto;
  }
  th, td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  th {
    font-weight: 600;
    background: var(--table-header-bg);
  }
  tr:nth-child(even) { background: var(--table-alt-bg); }
  /* ── 分割线 ── */
  hr { border: none; border-top: 1px solid var(--hr); margin: 2em 0; }
  /* ── 图片 ── */
  img { max-width: 100%; }
  /* ── 笔记/警告块（兼容 Obsidian callout 样式） ── */
  .callout {
    padding: 12px 16px;
    margin-bottom: 1em;
    border-left: 4px solid var(--link);
    background: #f0f6ff;
    border-radius: 6px;
  }
  .callout.warning { border-left-color: #d29922; background: #fff8c5; }
  .callout.danger  { border-left-color: #cf222e; background: #ffebe9; }
  .callout strong.callout-title { font-size: 0.9em; text-transform: uppercase; }
  /* ── KaTeX 公式居中 ── */
  .katex-display { margin: 0.8em 0; text-align: center; }
</style>

</head>
<body>
<h1 id="hello-github-pages">🧪 Hello GitHub Pages</h1>
<p>测试发布脚本跑通。</p>
<h2 id="latex-公式测试">LaTeX 公式测试</h2>
<p>行内公式：<span class="math inline">\(E = mc^2\)</span></p>
<p>行间公式：</p>
<p><span class="math display">\[
\int_{-\infty}^{\infty} e^{-x^2} dx = \sqrt{\pi}
\]</span></p>
<h2 id="表格测试">表格测试</h2>
<table>
<thead>
<tr>
<th>方法</th>
<th>复杂度</th>
<th>适用场景</th>
</tr>
</thead>
<tbody>
<tr>
<td>梯度下降</td>
<td><span class="math inline">\(O(n)\)</span></td>
<td>凸优化</td>
</tr>
<tr>
<td>牛顿法</td>
<td><span class="math inline">\(O(n^3)\)</span></td>
<td>小规模精确解</td>
</tr>
<tr>
<td>Adam</td>
<td><span class="math inline">\(O(n)\)</span></td>
<td>深度学习</td>
</tr>
</tbody>
</table>
<hr />
<p>✅ <strong>管线验证通过</strong></p>

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body, {  delimiters: [    {left: '$$', right: '$$', display: true},    {left: '$', right: '$', display: false},    {left: '\\(', right: '\\)', display: false},    {left: '\\[', right: '\\]', display: true}  ],  throwOnError: false});" crossorigin="anonymous"></script>
</body>
</html>
