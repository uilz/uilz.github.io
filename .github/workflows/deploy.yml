name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Timer
        working-directory: ./i/Timer          # 源码所在目录
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./i/Timer/out          # 构建输出目录
          destination_dir: i/Timer            # 部署到仓库的 i/Timer/ 路径
          keep_files: true                    # 保留 i/ 下的其他项目文件