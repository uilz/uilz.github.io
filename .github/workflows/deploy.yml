name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Timer
        working-directory: ./i/Timer
        run: |
          npm ci
          npm run build
          # 调试：确认 out 目录是否生成
          ls -la out

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./i/Timer/out          # 只取构建产物
          destination_dir: i/Timer            # 部署到 gh-pages 根下的 i/Timer/
          keep_files: true                    # 保留 i/ 下的其他项目