name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # 如果默认分支是 master，改为 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Timer
        working-directory: ./timer
        run: |
          npm ci
          npm run build

      - name: Copy output to i/Timer
        run: |
          rm -rf i/Timer
          cp -r timer/out i/Timer

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true