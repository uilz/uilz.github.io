name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Timer
        working-directory: ./i/Timer
        run: |
          npm ci
          npm run build

      # 关键：手动组装要部署的所有文件到一个临时目录
      - name: Assemble deploy files
        run: |
          rm -rf deploy
          mkdir -p deploy/i

          # 复制导航页根目录文件
          cp index.html deploy/

          # 复制 i/ 下其他项目（排除 i/Timer 源码目录，我们只要它的 out 构建产物）
          for dir in Redirect ChosenOne Fruitninja; do
            if [ -d "i/$dir" ]; then
              cp -r i/$dir deploy/i/
            fi
          done

          # 复制 Timer 的构建结果
          cp -r i/Timer/out deploy/i/Timer

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          # 不需要 destination_dir，直接整体推送