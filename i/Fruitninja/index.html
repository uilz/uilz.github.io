                    rotation: 0,
                    rotationSpeed: (Math.random() - 0.5) * 0.3,
                    isSliced: false,
                    active: true
                });

                // 附带水果概率随难度提升，开局更低
                const burstProb = Math.min(0.30 * this.burstScale, (0.12 + this.difficultyMultiplier * 0.05) * this.burstScale);
                if (Math.random() < burstProb) {
                    setTimeout(() => {
                        // 简单的递归调用，但要防止无限递归，这里手动添加一个
                        // 实际项目中最好把 spawnFruit 拆分为 createFruit 和 scheduleSpawn
                        // 这里简单处理：直接再推一个水果进数组，不走 spawnFruit 逻辑避免死循环
                        const item2 = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
                        this.fruits.push({
                            x: x + (Math.random() - 0.5) * 50,
                            y: y + 50,
                            vx: vx + (Math.random() - 0.5) * 2,
                            vy: vy * (0.9 + Math.random() * 0.2),
                            type: item2.type,
                            icon: item2.icon,
                            score: item2.score,
                            color: item2.color,
                            size: item2.size * (0.8 + Math.random() * 0.5),
                            rotation: 0,
                            rotationSpeed: (Math.random() - 0.5) * 0.3,
                            isSliced: false,
                            active: true
                        });
                    }, 100);
                }
            }

            updatePhysics() {
                // 时间流逝 (使用真实时间，不是帧数)
                if (this.timeSlowTimer > 0) {
                    this.timeSlowTimer -= this.deltaTime * 1000;
                    this.timeSlowFactor = 0.5;
                } else {
                    this.timeSlowFactor = 1;
                }

                // 归一化因子：抵消帧率波动，确保物理模拟稳定
                // timeScale = deltaTime * 60，60fps时=1，低帧率时>1补尝
                const ts = this.timeScale * this.timeSlowFactor;

                if (this.doubleScoreTimer > 0) {
                    this.doubleScoreTimer--;
                }

                // 难度增加
                this.gameTime = Math.floor((Date.now() - this.startTime) / 1000);
                this.applyDifficultyRamp(this.gameTime);
                // 难度系数：随时间缓慢增长，与 spawnRate 配合形成平滑曲线
                this.difficultyMultiplier = this.difficultyBase + Math.min(1.2, (this.gameTime / 180) * 1.2);

                // 更新时间显示（仅当秒数变化时刷新）
                this.refreshTimeDisplay();

                // 生成水果
                this.spawnTimer++;
                const currentSpawnRate = Math.max(this.spawnRateFloor, this.spawnRateInitial - (this.difficultyMultiplier * 6));
                if (this.spawnTimer > currentSpawnRate && this.fruits.length < this.maxFruits) {
                    this.spawnFruit();
                    this.spawnTimer = 0;
                }

                // 更新水果位置
                for (let i = this.fruits.length - 1; i >= 0; i--) {
                    let f = this.fruits[i];
                    f.x += f.vx * ts;
                    f.y += f.vy * ts;
                    f.vy += CONFIG.GRAVITY * ts;
                    f.rotation += f.rotationSpeed * ts;

                    // 移除出界水果
                    if (f.y > this.height + 100) {
                        if (!f.isSliced && f.type !== 'bomb' && f.type !== 'ice') {
                            // 漏掉水果直接扣命
                            this.lives--;
                            this.flashScreen('red'); // 红色闪烁警示
                            this.playMissSound(); // 播放漏掉音效
                            this.createFloatingText(f.x, this.height - 100, "Missed!", "#ff0000"); // 提示文字
                            this.createFloatingText(this.width / 2, this.height / 2, "-1 ❤️", "#ff0000"); // 屏幕中央提示扣血
                            this.updateHUD();
                            if (this.lives <= 0) {
                                this.gameOver("漏掉太多水果!");
                            }
                        }
                        this.fruits.splice(i, 1);
                        continue;
                    }
                }

                // 更新粒子 (限制最大数量)
                if (this.particles.length > (this.isMobile ? 30 : 80)) {
                    this.particles.splice(0, this.particles.length - (this.isMobile ? 30 : 80));
                }
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx * ts;
                    p.y += p.vy * ts;
                    p.vy += CONFIG.GRAVITY * 0.5 * ts;
                    p.life--;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }

                // 更新背景溅射 (限制最大数量)
                if (this.splatters.length > (this.isMobile ? 20 : 50)) {
                    this.splatters.splice(0, this.splatters.length - (this.isMobile ? 20 : 50));
                }
                for (let i = this.splatters.length - 1; i >= 0; i--) {
                    let s = this.splatters[i];
                    s.life--;
                    if (s.style === 'BLOB' || s.style === 'SPLASH') {
                        s.y += 0.2 * (s.size / 50) * ts;
                    }
                    if (s.life <= 0) this.splatters.splice(i, 1);
                }

                // 更新浮动文字
                for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
                    let t = this.floatingTexts[i];
                    t.y += t.vy * ts;
                    t.life--;
                    t.scale += 0.01 * ts;
                    if (t.life <= 0) this.floatingTexts.splice(i, 1);
                }

                // 更新刀光 (遍历所有轨迹)
                const maxTrail = this.bladeTrailLength || CONFIG.BLADE_LIFETIME;
                for (let i = 0; i < this.bladeTrails.length; i++) {
                    if (this.bladeTrails[i].length > maxTrail) {
                        this.bladeTrails[i].shift();
                    }
                }
            }

            checkCollisions() {
                // 修复多手识别异常导致的残留虚影
                // 如果检测到的手数量少于之前的轨迹数量，清除多余的轨迹
                const detectedHandCount = this.handLandmarks ? this.handLandmarks.length : 0;
                for (let i = detectedHandCount; i < 2; i++) {
                    this.bladeTrails[i] = []; // 立即清除未检测到的手的轨迹
                }

                if (!this.handLandmarks) return;

                // 遍历每一只手
                for (let i = 0; i < this.handLandmarks.length; i++) {
                    const hand = this.handLandmarks[i];
                    const state = this.handStates[i];

                    // 如果是张手(暂停手势)，不产生刀光
                    if (state === 'OPEN_PALM') {
                        this.bladeTrails[i] = []; // 清空该手的轨迹
                        continue;
                    }

                    // 获取食指指尖坐标
                    const indexTip = hand[8];

                    // 1. 转换归一化坐标到视频原始像素坐标
                    const dims = this.videoDims || { vw: this.video.videoWidth, vh: this.video.videoHeight };
                    const videoX = indexTip.x * dims.vw;
                    const videoY = indexTip.y * dims.vh;

                    // 2. 映射到 Canvas 坐标（基于 letterbox 缩放，不裁剪输入）
                    const mapping = this.videoMapping || { scale: 1, offsetX: 0, offsetY: 0 };
                    const canvasX = videoX * mapping.scale + mapping.offsetX;
                    const canvasY = videoY * mapping.scale + mapping.offsetY;

                    // 3. 应用镜像翻转
                    const tipX = this.width - canvasX;
                    const tipY = canvasY;

                    // 确保该手的轨迹数组存在
                    if (!this.bladeTrails[i]) this.bladeTrails[i] = [];

                    // 添加到轨迹
                    this.bladeTrails[i].push({ x: tipX, y: tipY, time: Date.now() }); // 记录时间戳

                    // 碰撞检测
                    if (this.bladeTrails[i].length < 2) continue;

                    const prev = this.bladeTrails[i][this.bladeTrails[i].length - 2];
                    const curr = { x: tipX, y: tipY };

                    // 计算切割速度（像素/毫秒）
                    const timeDiff = Date.now() - (prev.time || Date.now());
                    const distDiff = Math.hypot(curr.x - prev.x, curr.y - prev.y);
                    const cutSpeed = timeDiff > 0 ? distDiff / timeDiff : 0;

                    for (let f of this.fruits) {
                        if (f.isSliced || !f.active) continue;

                        const dist = this.lineDist(prev, curr, { x: f.x, y: f.y });

                        // 判定范围优化：修正判定范围过大的问题
                        // f.size 是字体大小(近似直径)，视觉半径约为 f.size/2
                        // PC: 0.6 (即 1.2倍半径), Mobile: 0.8 (即 1.6倍半径)
                        const hitboxScale = this.isMobile ? 0.8 : 0.6;

                        if (dist < f.size * hitboxScale) {
                            // 传入当前手的状态，用于判断是否防御炸弹
                            this.sliceFruit(f, state, cutSpeed);
                        }
                    }
                }
            }

            lineDist(p1, p2, p) {
                const l2 = (p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2;
                if (l2 === 0) return Math.hypot(p.x - p1.x, p.y - p1.y);
                let t = ((p.x - p1.x) * (p2.x - p1.x) + (p.y - p1.y) * (p2.y - p1.y)) / l2;
                t = Math.max(0, Math.min(1, t));
                return Math.hypot(p.x - (p1.x + t * (p2.x - p1.x)), p.y - (p1.y + t * (p2.y - p1.y)));
            }

            sliceFruit(fruit, handState, cutSpeed = 0) {
                // 防止重复切割 (Double Slice Guard)
                if (fruit.isSliced) return;

                fruit.isSliced = true;
                fruit.active = false; // 标记为非活跃，稍后移除或替换为碎片

                // 特殊效果
                if (fruit.type === 'bomb') {
                    if (handState === 'FIST') {
                        // 防御成功，不扣分
                        this.createFloatingText(fruit.x, fruit.y, "Blocked!", "#fff");
                    } else {
                        this.lives--;
                        this.flashScreen('red'); // 红色闪烁警示
                        this.playBombSound();
                        this.createFloatingText(fruit.x, fruit.y, "BOOM!", "#f00");
                        // 屏幕震动效果
                        this.canvas.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                        setTimeout(() => this.canvas.style.transform = 'none', 200);
                    }
                } else if (fruit.type === 'ice') {
                    this.playSliceSound(fruit, cutSpeed);
                    this.timeSlowTimer = 300; // 5秒慢动作
                    this.createFloatingText(fruit.x, fruit.y, "Freeze!", "#0ff");
                } else {
                    this.playSliceSound(fruit, cutSpeed);
                    // 普通水果
                    let points = fruit.score;
                    if (this.doubleScoreTimer > 0) {
                        points *= 2;
                    }
                    this.score += points;

                    // 奖励机制：每获得 100 分奖励 1 条生命 (最多 3 条)
                    if (Math.floor(this.score / 100) > Math.floor((this.score - points) / 100)) {
                        if (this.lives < 3) {
                            this.lives++;
                            this.createFloatingText(this.width / 2, this.height / 2, "Extra Life! +1 ❤️", "#00ff00");
                        }
                    }

                    // 连击判定
                    const now = Date.now();
                    if (now - this.lastSliceTime < CONFIG.COMBO_TIME_WINDOW) {
                        this.comboCount++;
                        if (this.comboCount > 1) {
                            this.score += this.comboCount; // 连击加分
                            this.createFloatingText(fruit.x, fruit.y - 30, `${this.comboCount} COMBO!`, "#ff00ff");
                        }
                    } else {
                        this.comboCount = 1;
                    }
                    this.lastSliceTime = now;

                    this.createFloatingText(fruit.x, fruit.y, `+${points}`, "#ff0");

                    this.slicedFruitsTotal++;
                    if (this.slicedFruitsTotal % 10 === 0) {
                        const effectType = Math.random() > 0.5 ? 'SLOW' : 'DOUBLE';
                        if (effectType === 'SLOW') {
                            this.timeSlowTimer = 300; // 5 seconds
                            this.createFloatingText(this.width / 2, this.height / 3, "BONUS: TIME SLOW!", "#00ffff");
                        } else {
                            this.doubleScoreTimer = 300; // 5 seconds
                            this.createFloatingText(this.width / 2, this.height / 3, "BONUS: DOUBLE SCORE!", "#ffd700");
                        }
                    }
                }

                this.createParticles(fruit);
                this.updateHUD();

                if (this.lives <= 0) {
                    this.gameOver("切到炸弹!");
                }
            }

            flashScreen(color) {
                const flash = document.createElement('div');
                flash.style.position = 'absolute';
                flash.style.top = '0';
                flash.style.left = '0';
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.backgroundColor = color;
                flash.style.opacity = '0.5';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = '100';
                flash.style.transition = 'opacity 0.2s';
                document.body.appendChild(flash);

                requestAnimationFrame(() => {
                    flash.style.opacity = '0';
                });
                setTimeout(() => flash.remove(), 200);
            }

            createParticles(fruit) {
                // 1. 背景溅射 (Splatter) - 增强版：多种样式、大小和密度
                if (fruit.type !== 'bomb' && fruit.type !== 'coconut') {
                    // 随机生成 1-3 个溅射层，增加密度感 (移动端限制为1层)
                    const splatterCount = this.isMobile ? 1 : (1 + Math.floor(Math.random() * 2));

                    for (let i = 0; i < splatterCount; i++) {
                        const rand = Math.random();
                        let style = 'BLOB';
                        if (rand > 0.7) style = 'SPLASH';
                        else if (rand > 0.4) style = 'MIST';

                        const splatter = {
                            x: fruit.x + (Math.random() - 0.5) * 60,
                            y: fruit.y + (Math.random() - 0.5) * 60,
                            color: fruit.color,
                            size: fruit.size * (0.6 + Math.random() * 0.4),
                            life: this.isMobile ? 60 : 120,
                            maxLife: this.isMobile ? 60 : 120,
                            rotation: Math.random() * Math.PI * 2,
                            style: style,
                            outline: [],
                            blobs: [],
                            points: [],
                            droplets: []
                        };

                        if (style === 'BLOB') {
                            const pointCount = this.isMobile ? 12 : (24 + Math.floor(Math.random() * 14));
                            for (let j = 0; j < pointCount; j++) {
                                const angle = (j / pointCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.12;
                                const radius = splatter.size * (0.55 + Math.random() * 0.55);
                                splatter.outline.push({
                                    x: Math.cos(angle) * radius,
                                    y: Math.sin(angle) * radius
                                });
                            }
                        } else if (style === 'SPLASH') {
                            const numPoints = this.isMobile ? 12 : (20 + Math.floor(Math.random() * 10));
                            for (let j = 0; j < numPoints; j++) {
                                const angle = (j / numPoints) * Math.PI * 2;
                                const r = splatter.size * (0.2 + Math.random() * 1.2);
                                splatter.points.push({
                                    x: Math.cos(angle) * r,
                                    y: Math.sin(angle) * r
                                });
                            }
                        } else if (style === 'MIST') {
                            const numDroplets = this.isMobile ? 6 : (12 + Math.floor(Math.random() * 8));
                            for (let j = 0; j < numDroplets; j++) {
                                const dist = Math.random() * splatter.size;
                                const angle = Math.random() * Math.PI * 2;
                                splatter.droplets.push({
                                    x: Math.cos(angle) * dist,
                                    y: Math.sin(angle) * dist,
                                    r: (Math.random() * 0.1 + 0.05) * splatter.size
                                });
                            }
                        }

                        this.splatters.push(splatter);
                    }
                }

                // 2. 飞散的水果碎片
                const fragmentCount = this.isMobile ? 4 : (6 + Math.floor(Math.random() * 4));
                for (let i = 0; i < fragmentCount; i++) {
                    const angle = (Math.PI * 2 / fragmentCount) * i + (Math.random() - 0.5) * 0.3;
                    const speed = (3 + Math.random() * 4) * (this.isMobile ? 0.7 : 1);

                    const fragment = {
                        x: fruit.x,
                        y: fruit.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.3,
                        size: fruit.size * (0.25 + Math.random() * 0.2),
                        color: fruit.color,
                        icon: fruit.icon,
                        life: this.isMobile ? 40 : 60,
                        maxLife: this.isMobile ? 40 : 60,
                        half: i < fragmentCount / 2 ? 'left' : 'right'
                    };

                    this.particles.push(fragment);
                }

                // 3. 得分文字
                this.floatingTexts.push({
                    x: fruit.x,
                    y: fruit.y,
                    text: `+${fruit.score}`,
                    vy: -3,
                    life: this.isMobile ? 30 : 45,
                    maxLife: this.isMobile ? 30 : 45,
                    color: fruit.score > 0 ? '#ffeb3b' : '#ff4444'
                });
            }

            createFloatingText(x, y, text, color) {
                // 性能优化：使用 Canvas 绘制文字代替 DOM 操作
                this.floatingTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    color: color,
                    life: 60, // 60帧 (约1秒)
                    vy: -2, // 向上飘
                    scale: 1
                });
            }

            updateHUD() {
                this.ui.score.innerText = this.score;
                if (this.ui.highScore) {
                    this.ui.highScore.innerText = this.highScore;
                }

                // 更新时间显示 (MM:SS)
                this.refreshTimeDisplay(true);

                // 更新生命值显示 (使用爱心图标)
                const maxLives = 3;
                // 剩余生命值
                const currentLives = Math.max(0, this.lives);

                // 清空并重新生成
                this.ui.livesContainer.innerHTML = '';
                for (let i = 0; i < maxLives; i++) {
                    const heartIcon = document.createElement('div');
                    heartIcon.className = 'life-icon';
                    heartIcon.innerText = '❤️';

                    // 如果当前索引 >= 剩余生命值，说明这个心丢了
                    // 例如 lives=2, i=0(ok), i=1(ok), i=2(lost)
                    if (i >= currentLives) {
                        heartIcon.classList.add('life-lost');
                        heartIcon.innerText = '🤍'; // 丢失变成白心或空心
                    }
                    this.ui.livesContainer.appendChild(heartIcon);
                }
            }

            // 只在秒数变化时更新时间显示，减少跳变与卡顿
            refreshTimeDisplay(force = false) {
                if (!this.ui.time) return;
                if (!force && this.gameTime === this.lastDisplayedTime) return;
                this.lastDisplayedTime = this.gameTime;
                const minutes = Math.floor(this.gameTime / 60).toString().padStart(2, '0');
                const seconds = (this.gameTime % 60).toString().padStart(2, '0');
                this.ui.time.innerText = `${minutes}:${seconds}`;
            }

            draw() {
                // 清空画布
                this.ctx.clearRect(0, 0, this.width, this.height);

                // 1. 绘制摄像头背景：使用离屏 canvas（已缓存视频帧）
                if (this.video.readyState >= 2) {
                    this.ctx.save();
                    this.ctx.scale(-1, 1);
                    this.ctx.translate(-this.width, 0);
                    this.ctx.drawImage(this.videoCanvas, 0, 0, this.width, this.height);
                    this.ctx.restore();
                } else {
                    const gradient = this.ctx.createLinearGradient(0, 0, this.width, this.height);
                    gradient.addColorStop(0, '#5d4037');
                    gradient.addColorStop(1, '#3e2723');
                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(0, 0, this.width, this.height);
                }

                // 1.5 绘制背景果汁溅射 (Splatters) - 限制数量
                const splattersToDraw = this.splatters.slice(-this.maxSplatters);
                for (let s of splattersToDraw) {
                    this.ctx.save();
                    this.ctx.translate(s.x, s.y);
                    this.ctx.rotate(s.rotation);
                    // 增加透明度，让它看起来像液体附着在表面
                    this.ctx.globalAlpha = Math.min(0.85, s.life / 60);
                    this.ctx.fillStyle = s.color;

                    if (s.style === 'MIST') {
                        // 绘制散落液滴
                        for (let d of s.droplets) {
                            this.ctx.beginPath();
                            this.ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                            this.ctx.fill();
                        }
                    } else if (s.style === 'BLOB') {
                        // 使用预计算的不规则外形，避免出现规则圆形
                        if (s.outline && s.outline.length > 2) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(s.outline[0].x, s.outline[0].y);
                            for (let i = 1; i < s.outline.length; i++) {
                                this.ctx.lineTo(s.outline[i].x, s.outline[i].y);
                            }
                            this.ctx.closePath();
                            this.ctx.fill();

                            if (!this.isMobile) {
                                this.ctx.save();
                                this.ctx.globalAlpha *= 0.25;
                                this.ctx.fillStyle = '#ffffff';
                                // 在外形内随机放置一个小高光，保持不规则感
                                const pick = s.outline[Math.floor(Math.random() * s.outline.length)];
                                const hiSize = s.size * 0.15;
                                this.ctx.beginPath();
                                this.ctx.ellipse(pick.x * 0.3, pick.y * 0.3, hiSize, hiSize * 0.6, Math.PI / 3, 0, Math.PI * 2);
                                this.ctx.fill();
                                this.ctx.restore();
                            }
                        }
                    } else {
                        // SPLASH 使用预计算的多边形
                        if (s.points && s.points.length > 0) {
                            this.ctx.beginPath();

                            // SPLASH 保持尖锐
                            this.ctx.moveTo(s.points[0].x, s.points[0].y);
                            for (let i = 1; i < s.points.length; i++) {
                                this.ctx.lineTo(s.points[i].x, s.points[i].y);
                            }

                            this.ctx.closePath();
                            this.ctx.fill();

                            // 添加液体高光 (Wet Highlight) - 简单高效的模拟
                            if (!this.isMobile) {
                                this.ctx.globalAlpha *= 0.4; // 高光透明度
                                this.ctx.fillStyle = '#ffffff';
                                // 在左上角绘制一个模糊的反射光斑
                                this.ctx.beginPath();
                                // 根据形状大小调整高光
                                const highlightSize = s.size * 0.25;
                                const highlightOffset = s.size * 0.2;
                                // 绘制一个月牙形或椭圆
                                this.ctx.ellipse(-highlightOffset, -highlightOffset, highlightSize, highlightSize * 0.6, Math.PI / 4, 0, Math.PI * 2);
                                this.ctx.fill();
                            }
                        }
                    }
                    this.ctx.restore();
                }
                this.ctx.globalAlpha = 1;

                // 2. 绘制水果 (使用预渲染 Emoji 缓存，懒加载)
                for (let f of this.fruits) {
                    this.ensureEmojiCached(f.type);
                    const cached = this.emojiCache[f.type];
                    if (!cached) continue;

                    this.ctx.save();
                    this.ctx.translate(f.x, f.y);

                    if (f.isSliced && f.halfIndex) {
                        this.ctx.save();
                        this.ctx.rotate(f.sliceAngle);
                        this.ctx.beginPath();
                        if (f.halfIndex === 1) {
                            this.ctx.rect(-f.size, -f.size, f.size * 2, f.size);
                        } else {
                            this.ctx.rect(-f.size, 0, f.size * 2, f.size);
                        }
                        this.ctx.clip();
                        this.ctx.restore();
                    } else {
                        this.ctx.rotate(f.sliceAngle);
                    }

                    this.ctx.rotate(f.rotation);
                    const drawSize = f.size * 1.2;
                    this.ctx.drawImage(cached, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
                    this.ctx.restore();
                }

                // 3. 绘制粒子 (按颜色分组批量绘制，减少 ctx 状态切换)
                const particleByColor = {};
                for (let p of this.particles) {
                    if (!particleByColor[p.color]) particleByColor[p.color] = [];
                    particleByColor[p.color].push(p);
                }
                for (const color in particleByColor) {
                    this.ctx.fillStyle = color;
                    this.ctx.beginPath();
                    for (const p of particleByColor[color]) {
                        this.ctx.globalAlpha = Math.max(0, p.life / 50);
                        if (p.verts && p.verts.length) {
                            this.ctx.moveTo(p.x + p.verts[0].x, p.y + p.verts[0].y);
                            for (let k = 1; k < p.verts.length; k++) {
                                this.ctx.lineTo(p.x + p.verts[k].x, p.y + p.verts[k].y);
                            }
                            this.ctx.closePath();
                        } else {
                            this.ctx.moveTo(p.x + 2.5, p.y);
                            this.ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                        }
                    }
                    this.ctx.fill();
                }
                this.ctx.globalAlpha = 1;

                // 3.1 绘制浮动文字
                this.ctx.save();
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                if (!this.isMobile) {
                    this.ctx.shadowColor = 'black';
                    this.ctx.shadowBlur = 2;
                    this.ctx.shadowOffsetX = 2;
                    this.ctx.shadowOffsetY = 2;
                }

                for (let t of this.floatingTexts) {
                    this.ctx.fillStyle = t.color;
                    this.ctx.font = `bold ${30 * t.scale}px Arial`;
                    this.ctx.globalAlpha = Math.min(1, t.life / 20); // 最后20帧渐隐
                    this.ctx.fillText(t.text, t.x, t.y);
                }
                this.ctx.restore();

                // 4. 绘制刀光轨迹 (支持多手)
                const maxTrailLen = this.bladeTrailLength || 6;
                for (let i = 0; i < this.bladeTrails.length; i++) {
                    const trail = this.bladeTrails[i];
                    if (!trail || trail.length < 2) continue;

                    this.ctx.beginPath();
                    this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                    this.ctx.lineWidth = this.isMobile ? 3 : 5;
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';

                    this.ctx.moveTo(trail[0].x, trail[0].y);
                    for (let j = 1; j < Math.min(trail.length, maxTrailLen); j++) {
                        this.ctx.lineTo(trail[j].x, trail[j].y);
                    }
                    this.ctx.stroke();

                    // 刀光发光效果 (桌面端)
                    if (!this.isMobile) {
                        const colors = ['#00ffff', '#ff00ff'];
                        this.ctx.shadowBlur = 10;
                        this.ctx.shadowColor = colors[i % colors.length];
                        this.ctx.stroke();
                        this.ctx.shadowBlur = 0;
                    }
                }

                // 5. 绘制手势识别点 (调试用)
                if (this.handLandmarks && this.video.readyState >= 2) {
                    const dims = this.videoDims || { vw: this.video.videoWidth, vh: this.video.videoHeight };
                    const map = this.videoMapping || { scale: 1, offsetX: 0, offsetY: 0 };

                    this.ctx.fillStyle = '#00ff00';
                    for (const landmarks of this.handLandmarks) {
                        // Helper to map coordinates using letterbox mapping
                        const mapCoord = (p) => {
                            const vx = p.x * dims.vw;
                            const vy = p.y * dims.vh;
                            const cx = vx * map.scale + map.offsetX;
                            const cy = vy * map.scale + map.offsetY;
                            return { x: this.width - cx, y: cy };
                        };

                        // 绘制食指指尖
                        const tip = landmarks[8];
                        const tipPos = mapCoord(tip);

                        this.ctx.beginPath();
                        this.ctx.arc(tipPos.x, tipPos.y, 10, 0, Math.PI * 2);
                        this.ctx.fill();

                        // 绘制手腕作为参考
                        const wrist = landmarks[0];
                        const wristPos = mapCoord(wrist);

                        this.ctx.fillStyle = '#ffff00';
                        this.ctx.beginPath();
                        this.ctx.arc(wristPos.x, wristPos.y, 5, 0, Math.PI * 2);
                        this.ctx.fill();
                        this.ctx.fillStyle = '#00ff00';
                    }
                }

                // 6. 绘制菜单交互进度 (悬停光圈)
                if (this.menuHoverTarget && this.menuHoverTimer > 0) {
                    const progress = this.menuHoverTimer / this.menuHoverMaxTime;
                    this.ctx.beginPath();
                    this.ctx.arc(this.menuHoverTarget.x, this.menuHoverTarget.y, 30, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
                    this.ctx.strokeStyle = '#00ff00';
                    this.ctx.lineWidth = 5;
                    this.ctx.stroke();

                    this.ctx.beginPath();
                    this.ctx.arc(this.menuHoverTarget.x, this.menuHoverTarget.y, 30, 0, Math.PI * 2);
                    this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    this.ctx.lineWidth = 5;
                    this.ctx.stroke();
                }

                // 7. 绘制手势长按进度 (重置/暂停)
                if (this.gestureState === 'TWO_HANDS_OPEN' && this.gestureStartTime) {
                    const elapsed = Date.now() - this.gestureStartTime;
                    const progress = Math.min(1, elapsed / 1500);

                    this.ctx.save();
                    this.ctx.translate(this.width / 2, this.height / 2);

                    // 背景圈
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    this.ctx.fill();

                    // 进度圈
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 60, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
                    this.ctx.strokeStyle = '#ff4444'; // 红色警告色
                    this.ctx.lineWidth = 10;
                    this.ctx.stroke();

                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '20px Arial';
                    this.ctx.fillText("重置中...", 0, 5);

                    this.ctx.restore();
                } else if (this.gestureState === 'OPEN_PALM' && this.gestureStartTime) {
                    const elapsed = Date.now() - this.gestureStartTime;
                    const progress = Math.min(1, elapsed / 2000);

                    this.ctx.save();
                    this.ctx.translate(this.width / 2, this.height / 2);

                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 50, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
                    this.ctx.strokeStyle = '#ffff00'; // 黄色
                    this.ctx.lineWidth = 8;
                    this.ctx.stroke();

                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '16px Arial';
                    this.ctx.fillText("暂停...", 0, 5);

                    this.ctx.restore();
                }
            }

            checkMenuInteraction() {
                if (!this.handLandmarks || this.handLandmarks.length === 0) {
                    this.menuHoverTimer = 0;
                    this.menuHoverTarget = null;
                    return;
                }

                // 确定当前应该检测哪个按钮
                let targetBtn = null;
                if (this.state === 'MENU') targetBtn = this.ui.startBtn;
                else if (this.state === 'GAMEOVER') targetBtn = this.ui.restartBtn;
                else if (this.state === 'PAUSED') targetBtn = this.ui.resumeBtn;

                if (!targetBtn) return;

                const rect = targetBtn.getBoundingClientRect();
                let isHovering = false;

                // 检查任意一只手的食指是否在按钮区域内
                for (const hand of this.handLandmarks) {
                    const indexTip = hand[8];

                    // 映射坐标 (复用 letterbox 映射)
                    const dims = this.videoDims || { vw: this.video.videoWidth, vh: this.video.videoHeight };
                    const videoX = indexTip.x * dims.vw;
                    const videoY = indexTip.y * dims.vh;
                    const map = this.videoMapping || { scale: 1, offsetX: 0, offsetY: 0 };
                    const canvasX = videoX * map.scale + map.offsetX;
                    const canvasY = videoY * map.scale + map.offsetY;
                    const tipX = this.width - canvasX;
                    const tipY = canvasY;

                    // 简单的矩形碰撞检测
                    if (tipX >= rect.left && tipX <= rect.right &&
                        tipY >= rect.top && tipY <= rect.bottom) {
                        isHovering = true;
                        this.menuHoverTarget = { x: tipX, y: tipY }; // 记录悬停位置用于绘制进度
                        break;
                    }
                }

                if (isHovering) {
                    this.menuHoverTimer++;
                    // 视觉反馈：按钮轻微缩放
                    targetBtn.style.transform = `scale(${1 + this.menuHoverTimer / this.menuHoverMaxTime * 0.1})`;

                    if (this.menuHoverTimer >= this.menuHoverMaxTime) {
                        targetBtn.click();
                        this.menuHoverTimer = 0;
                        this.menuHoverTarget = null;
                        targetBtn.style.transform = '';
                    }
                } else {
                    this.menuHoverTimer = Math.max(0, this.menuHoverTimer - 5); // 快速衰减
                    if (this.menuHoverTimer === 0) {
                        this.menuHoverTarget = null;
                        targetBtn.style.transform = '';
                    }
                }
            }

            adjustPerformance() {
                // 降低水果数量上限
                if (this.maxFruits > 4) {
                    this.maxFruits = Math.max(4, this.maxFruits - 3);
                    console.log(`[Performance] 降低水果上限至 ${this.maxFruits}`);
                }

                // 降低粒子数量
                if (this.particleCount > 1) {
                    this.particleCount = Math.max(1, this.particleCount - 1);
                    console.log(`[Performance] 降低粒子数量至 ${this.particleCount}`);
                }

                // 降低溅射上限
                if (this.maxSplatters > 5) {
                    this.maxSplatters = Math.max(5, this.maxSplatters - 3);
                    console.log(`[Performance] 降低溅射上限至 ${this.maxSplatters}`);
                }

                // 增加检测间隔（最大300ms）
                if (this.detectionInterval < 300) {
                    this.detectionInterval += 20;
                    console.log(`[Performance] 增加检测间隔至 ${this.detectionInterval}ms`);
                }

                // 缩短刀光轨迹
                if (this.bladeTrailLength > 3) {
                    this.bladeTrailLength -= 2;
                    console.log(`[Performance] 缩短刀光轨迹至 ${this.bladeTrailLength}`);
                }
            }
        }

        // 启动游戏
        const game = new FruitNinjaGame();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch((e) => {
                console.warn('Service Worker 注册失败', e);
            });
        }

    </script>
