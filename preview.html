<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🍎 苹果果 · AI 学习伙伴</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   AppleGo Demo v3 — 会成长的伙伴
   核心：活记忆引擎 + 时间维度 + 工具打通 + AI 主动
   守 Manifesto：四页主导 + 更多聚合 + 建模隐藏叙事
   ═══════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500&display=swap');

:root {
  --color-page:#f5f5f7; --color-page-secondary:#eeeef0;
  --color-surface:#ffffff; --color-surface-alt:#fafafa; --color-surface-hover:#e8e8ec;
  --color-ink-primary:#1c1c1e; --color-ink-secondary:#6c6c78; --color-ink-muted:#a0a0ab; --color-ink-link:#0a84ff;
  --color-accent:#0a84ff; --color-accent-hover:#0070e0; --color-accent-soft:rgba(10,132,255,.08); --color-accent-glow:rgba(10,132,255,.12);
  --color-success:#34c759; --color-success-soft:rgba(52,199,89,.12);
  --color-warning:#ff9f0a; --color-warning-soft:rgba(255,159,10,.12);
  --color-danger:#ff3b30; --color-danger-soft:rgba(255,59,48,.10);
  --color-purple:#af52de; --color-purple-soft:rgba(175,82,222,.10);
  --color-teal:#5ac8fa; --color-teal-soft:rgba(90,200,250,.12);
  --color-pink:#ff2d92; --color-pink-soft:rgba(255,45,146,.10);
  --color-divider:#e5e5ea; --color-divider-hover:#d1d1d6; --color-divider-soft:#f0f0f2;
  --color-ai-msg:#f7f3ea; --color-ai-msg-strong:#efe9d8; --color-user-msg:#ebe7dd;
  --radius-sm:8px; --radius-md:14px; --radius-lg:18px; --radius-xl:24px; --radius-full:9999px;
  --space-1:4px; --space-2:8px; --space-3:14px; --space-4:18px; --space-5:28px; --space-6:36px; --space-8:56px;
  --font-sans:'Inter','Noto Sans SC',system-ui,-apple-system,sans-serif;
  --font-serif:'Noto Serif SC','Iowan Old Style',serif;
  --font-mono:'SF Mono','JetBrains Mono',monospace;
  --ease-out:cubic-bezier(0,0,0.2,1); --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --bottom-nav-height:68px; --content-max:560px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font-sans);background:var(--color-page);color:var(--color-ink-primary);min-height:100vh;line-height:1.6;overflow-x:hidden;padding-bottom:var(--bottom-nav-height)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--color-ink-muted);border-radius:3px}
::selection{background:rgba(10,132,255,.15)}

/* 演示控制条 */
#demo-bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(28,28,30,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius-full);padding:6px 8px;display:flex;align-items:center;gap:4px;box-shadow:0 4px 24px rgba(0,0,0,.18);font-size:12px;color:#e5e5ea;max-width:calc(100vw - 24px);transition:all .2s var(--ease-out)}
#demo-bar.collapsed{padding:6px 10px}#demo-bar.collapsed .demo-bar-content{display:none}
.demo-bar-content{display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:center}
.demo-bar-label{color:#8e8e93;padding:0 6px;font-size:11px;white-space:nowrap}
.demo-chip{padding:5px 11px;border-radius:var(--radius-full);font-size:11.5px;color:#c7c7cc;transition:all .15s var(--ease-out);white-space:nowrap;font-weight:500}
.demo-chip:hover{background:rgba(255,255,255,.08);color:#fff}
.demo-chip.active{background:var(--color-accent);color:#fff}
.demo-bar-toggle{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#8e8e93;font-size:13px;flex-shrink:0}
.demo-bar-toggle:hover{background:rgba(255,255,255,.08);color:#fff}
.demo-bar-divider{width:1px;height:16px;background:rgba(255,255,255,.12);margin:0 2px}

/* 底部导航 */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-height);background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--color-divider);display:flex;justify-content:center;align-items:center;gap:var(--space-6);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--color-ink-muted);font-size:10.5px;font-weight:500;padding:8px 10px;border-radius:var(--radius-md);transition:color .15s var(--ease-out);min-width:56px}
.nav-tab:hover{color:var(--color-ink-secondary)}
.nav-tab.active{color:var(--color-accent)}
.nav-tab svg{width:24px;height:24px}

/* 主区 */
#app{max-width:var(--content-max);margin:0 auto;padding:76px var(--space-4) var(--space-6);min-height:100vh}
.card{background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:0 1px 3px rgba(0,0,0,.04),0 0 0 1px var(--color-divider-soft);padding:var(--space-5)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;font-size:15px;font-weight:600;border-radius:var(--radius-full);transition:all .15s var(--ease-out);min-height:48px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--color-accent);color:#fff;box-shadow:0 4px 14px var(--color-accent-glow)}
.btn-primary:hover{background:var(--color-accent-hover)}.btn-primary:disabled{opacity:.6}
.btn-outline{background:transparent;color:var(--color-ink-primary);box-shadow:inset 0 0 0 1.5px var(--color-divider)}
.btn-outline:hover{background:var(--color-surface-alt)}
.btn-lg{padding:15px 36px;font-size:16px}
.text-link{color:var(--color-ink-muted);font-size:13px;padding:8px 12px;transition:color .15s;background:none}
.text-link:hover{color:var(--color-ink-secondary)}
.input-field{width:100%;background:var(--color-surface);border:1.5px solid var(--color-divider);border-radius:var(--radius-md);padding:14px 16px;font-size:15px;color:var(--color-ink-primary);transition:border-color .15s;outline:none}
.input-field:focus{border-color:var(--color-accent)}.input-field::placeholder{color:var(--color-ink-muted)}

/* TODAY */
.today-quote{font-family:var(--font-serif);font-size:13px;color:var(--color-ink-muted);text-align:center;margin-bottom:var(--space-4);font-style:italic;line-height:1.7}
.today-greeting{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.today-date{font-size:14px;color:var(--color-ink-muted);margin-bottom:var(--space-5)}
.today-observation{font-size:15px;line-height:1.7;color:var(--color-ink-secondary);margin-bottom:var(--space-5)}
.focus-card{margin-bottom:var(--space-5)}
.focus-card .focus-label{font-size:12px;color:var(--color-ink-muted);margin-bottom:6px;font-weight:500}
.focus-card .focus-title{font-size:20px;font-weight:600;margin-bottom:8px;line-height:1.3}
.focus-card .focus-desc{font-size:14px;color:var(--color-ink-secondary);margin-bottom:12px}
.focus-meta{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--color-ink-muted)}
.focus-meta svg{width:14px;height:14px}
.after-plan{font-size:14px;color:var(--color-ink-secondary);margin-bottom:var(--space-6);line-height:1.7}
.cta-block{display:flex;flex-direction:column;align-items:center;gap:10px}
.cta-hint{font-size:12px;color:var(--color-ink-muted)}
.today-tools{display:flex;gap:10px;margin:var(--space-5) 0;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.today-tools::-webkit-scrollbar{display:none}
.tool-quick{flex-shrink:0;display:flex;align-items:center;gap:8px;background:var(--color-surface);border-radius:var(--radius-md);padding:12px 14px;box-shadow:0 0 0 1px var(--color-divider-soft);transition:all .15s}
.tool-quick:hover{box-shadow:0 0 0 1.5px var(--color-divider-hover);transform:translateY(-1px)}
.tool-quick .tq-icon{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.tool-quick .tq-text strong{display:block;font-weight:600;color:var(--color-ink-primary);font-size:13px}
.tool-quick .tq-text span{color:var(--color-ink-muted);font-size:11.5px}
.welcome-hero{text-align:center;padding:var(--space-8) var(--space-4)}
.welcome-hero .apple{font-size:56px;margin-bottom:var(--space-4);display:block}
.welcome-hero h1{font-size:26px;font-weight:700;margin-bottom:var(--space-3);letter-spacing:-.02em}
.welcome-hero p{font-size:15px;color:var(--color-ink-secondary);line-height:1.7;max-width:360px;margin:0 auto var(--space-6)}
/* 记忆变化提示(学完后苹果果说的新洞察) */
.memory-pulse{margin:var(--space-4) 0;padding:14px 16px;background:linear-gradient(135deg,var(--color-accent-soft),transparent);border-radius:var(--radius-md);border-left:3px solid var(--color-accent);display:flex;gap:10px;align-items:flex-start;animation:msgIn .4s var(--ease-spring)}
.memory-pulse .mp-icon{font-size:18px;flex-shrink:0}
.memory-pulse .mp-text{font-size:13.5px;line-height:1.6;color:var(--color-ink-primary)}
.memory-pulse .mp-text strong{color:var(--color-accent)}

/* SESSION */
#session-overlay{position:fixed;inset:0;background:var(--color-page);z-index:200;display:none;flex-direction:column;animation:sessionEnter .3s var(--ease-out)}
#session-overlay.active{display:flex}
@keyframes sessionEnter{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.session-topbar{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--color-divider);padding:14px var(--space-4);display:flex;align-items:center;gap:var(--space-3);padding-top:calc(14px + env(safe-area-inset-top,0))}
.session-back{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;color:var(--color-ink-secondary);flex-shrink:0;transition:background .15s}
.session-back:hover{background:var(--color-surface-hover)}
.session-title{flex:1;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-tools-trigger{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:var(--color-ink-secondary);transition:all .15s;position:relative}
.session-tools-trigger:hover{background:var(--color-surface-hover);color:var(--color-ink-primary)}
.session-tools-trigger.active{background:var(--color-accent-soft);color:var(--color-accent)}
.session-tools-trigger .nudge{position:absolute;top:-2px;right:-2px;background:var(--color-accent);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;place-items:center;animation:pulse 1.5s infinite}
.session-tools-trigger .nudge.show{display:grid}
.pomodoro-badge{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--color-danger);display:none}
.pomodoro-badge.running{display:block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.session-stages{display:flex;gap:4px;align-items:center}
.stage-dot{width:6px;height:6px;border-radius:50%;background:var(--color-divider);transition:all .3s var(--ease-out)}
.stage-dot.active{background:var(--color-accent);width:18px;border-radius:3px}
.stage-dot.done{background:var(--color-accent)}
.session-progress{height:3px;background:var(--color-divider-soft);position:relative}
.session-progress-fill{position:absolute;left:0;top:0;bottom:0;background:var(--color-accent);border-radius:0 3px 3px 0;transition:width .5s var(--ease-out)}
.session-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.stage-center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:var(--space-6) var(--space-5);max-width:var(--content-max);margin:0 auto;width:100%}
.stage-center .ai-quote{font-size:19px;line-height:1.6;font-weight:500;margin-bottom:var(--space-5);letter-spacing:-.01em}
.last-session-card{background:var(--color-surface);border-radius:var(--radius-lg);padding:var(--space-5);margin-bottom:var(--space-6);box-shadow:0 0 0 1px var(--color-divider-soft)}
.last-session-card .label{font-size:12px;color:var(--color-ink-muted);margin-bottom:6px}
.last-session-card .title{font-size:18px;font-weight:600;margin-bottom:8px}
.last-session-card .skills{font-size:12px;color:var(--color-ink-muted)}
.conversation{flex:1;display:flex;flex-direction:column;max-width:var(--content-max);margin:0 auto;width:100%;padding:var(--space-5) var(--space-5) var(--space-3)}
.msg-list{flex:1;display:flex;flex-direction:column;gap:var(--space-4);padding-bottom:var(--space-4)}
.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .3s var(--ease-out)}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:13px;font-weight:600}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#c4a3d4 0%,#7a5a8c 100%);color:#fff}
.msg.user{flex-direction:row-reverse}
.msg.user .msg-avatar{border-radius:8px;background:var(--color-accent);color:#fff}
.msg-bubble{max-width:80%;padding:13px 16px;font-size:15px;line-height:1.65}
.msg.ai .msg-bubble{background:var(--color-ai-msg);border-radius:3px 18px 18px 18px}
.msg.user .msg-bubble{background:var(--color-user-msg);border-radius:18px 18px 3px 18px}
.typing-cursor{display:inline-block;width:2px;height:1em;background:var(--color-ink-secondary);margin-left:2px;vertical-align:text-bottom;animation:blink .8s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.thinking{display:flex;gap:4px;padding:4px 0}
.thinking span{width:7px;height:7px;border-radius:50%;background:var(--color-ink-muted);animation:thinking 1.2s infinite}
.thinking span:nth-child(2){animation-delay:.2s}.thinking span:nth-child(3){animation-delay:.4s}
@keyframes thinking{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.embed-tool-card{margin-top:10px;background:var(--color-surface);border:1.5px dashed var(--color-divider);border-radius:var(--radius-md);padding:12px 14px;display:flex;align-items:center;gap:10px;animation:msgIn .3s var(--ease-out)}
.embed-tool-card .et-icon{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;font-size:17px;flex-shrink:0}
.embed-tool-card .et-text{flex:1;font-size:13px;color:var(--color-ink-secondary);line-height:1.5}
.embed-tool-card .et-text strong{color:var(--color-ink-primary);display:block;font-size:13.5px;font-weight:600;margin-bottom:2px}
.embed-tool-card .et-btn{font-size:12px;font-weight:600;color:var(--color-accent);padding:6px 12px;border-radius:var(--radius-full);background:var(--color-accent-soft);white-space:nowrap}
.learn-input-bar{display:flex;gap:8px;padding:var(--space-3) var(--space-5);background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-top:1px solid var(--color-divider);max-width:var(--content-max);margin:0 auto;width:100%}
.learn-input-bar input{flex:1;background:var(--color-surface);border:1.5px solid var(--color-divider);border-radius:var(--radius-full);padding:12px 18px;font-size:14px;outline:none;transition:border-color .15s}
.learn-input-bar input:focus{border-color:var(--color-accent)}
.learn-send{width:42px;height:42px;border-radius:50%;background:var(--color-accent);color:#fff;display:grid;place-items:center;flex-shrink:0;transition:all .15s}
.learn-send:hover{background:var(--color-accent-hover)}
.suggestion-row{display:flex;gap:8px;padding:0 var(--space-5) var(--space-3);flex-wrap:wrap;max-width:var(--content-max);margin:0 auto;width:100%}
.suggestion-pill{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-full);padding:8px 14px;font-size:13px;color:var(--color-ink-secondary);transition:all .15s}
.suggestion-pill:hover{border-color:var(--color-ink-muted);color:var(--color-ink-primary)}
.practice-box{padding:var(--space-4) var(--space-5) var(--space-3);max-width:var(--content-max);margin:0 auto;width:100%}
.practice-question{background:var(--color-surface);border-radius:var(--radius-lg);padding:var(--space-5);box-shadow:0 0 0 1px var(--color-divider-soft);margin-bottom:var(--space-4);animation:msgIn .3s var(--ease-out)}
.practice-question .q-label{font-size:12px;color:var(--color-ink-muted);margin-bottom:8px;font-weight:500}
.practice-question .q-text{font-size:16px;line-height:1.6;margin-bottom:var(--space-4)}
.practice-question .q-code{font-family:var(--font-mono);background:var(--color-page-secondary);padding:14px;border-radius:var(--radius-md);font-size:13.5px;margin-bottom:var(--space-4);white-space:pre;overflow-x:auto}
.q-options{display:flex;flex-direction:column;gap:10px}
.q-option{background:var(--color-surface);border:1.5px solid var(--color-divider);border-radius:var(--radius-md);padding:14px 16px;font-size:15px;text-align:left;transition:all .15s var(--ease-out);font-family:var(--font-mono)}
.q-option:hover:not(.locked){border-color:var(--color-ink-muted);background:var(--color-surface-alt)}
.q-option.locked{cursor:default}
.q-option.correct{border-color:var(--color-success);background:var(--color-success-soft)}
.q-option.wrong{border-color:var(--color-danger);background:var(--color-danger-soft)}
.feedback-bubble .verdict{font-weight:600;margin-bottom:4px}
.feedback-bubble.ok .verdict{color:var(--color-success)}
.feedback-bubble.nope .verdict{color:var(--color-warning)}
.reflect-box{padding:var(--space-5);max-width:var(--content-max);margin:0 auto;width:100%}
.reflect-prompt{font-size:19px;font-weight:500;margin-bottom:var(--space-2);letter-spacing:-.01em}
.reflect-sub{font-size:14px;color:var(--color-ink-muted);margin-bottom:var(--space-5)}
.reflect-textarea{width:100%;min-height:160px;background:var(--color-surface);border:1.5px solid var(--color-divider);border-radius:var(--radius-md);padding:16px;font-size:15px;font-family:var(--font-serif);line-height:1.8;resize:vertical;outline:none;transition:border-color .15s;margin-bottom:var(--space-4)}
.reflect-textarea:focus{border-color:var(--color-accent)}
.reflect-textarea::placeholder{color:var(--color-ink-muted);font-family:var(--font-sans)}
.reflect-draft-btn{display:inline-flex;align-items:center;gap:6px;color:var(--color-accent);font-size:13px;font-weight:500;padding:8px 0;transition:opacity .15s}
.reflect-draft-btn:hover{opacity:.7}
.reflect-actions{display:flex;justify-content:space-between;align-items:center;margin-top:var(--space-5)}
.finish-hero{text-align:center}
.finish-hero .ai-quote{font-family:var(--font-serif);font-size:21px;line-height:1.7;margin-bottom:var(--space-6);font-weight:400}

/* 工具面板/托盘/全屏工具页(沿用 v2,精简) */
.tool-tray-menu{position:fixed;top:60px;right:16px;background:var(--color-surface);border-radius:var(--radius-md);box-shadow:0 8px 32px rgba(0,0,0,.18);padding:6px;z-index:250;display:none;min-width:180px;animation:msgIn .2s var(--ease-out)}
.tool-tray-menu.active{display:block}
.tray-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-sm);transition:background .15s;width:100%;text-align:left}
.tray-item:hover{background:var(--color-surface-hover)}
.tray-item .ti-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
.tray-item .ti-tx{font-size:14px;font-weight:500}.tray-item .ti-tx span{display:block;font-size:11.5px;color:var(--color-ink-muted);font-weight:400}
.tool-page{position:fixed;inset:0;background:var(--color-page);z-index:300;display:none;flex-direction:column;animation:sessionEnter .3s var(--ease-out)}
.tool-page.active{display:flex}
.tool-page-topbar{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-divider);padding:14px var(--space-4);display:flex;align-items:center;gap:var(--space-3);padding-top:calc(14px + env(safe-area-inset-top,0))}
.tool-page-title{flex:1;font-size:16px;font-weight:600}
.tool-page-body{flex:1;overflow-y:auto}

/* 「更多」工具箱 */
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.more-card{background:var(--color-surface);border-radius:var(--radius-lg);padding:var(--space-5) var(--space-4);box-shadow:0 0 0 1px var(--color-divider-soft);transition:all .2s var(--ease-out);text-align:left;display:flex;flex-direction:column;gap:10px}
.more-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06),0 0 0 1.5px var(--color-divider-hover);transform:translateY(-2px)}
.more-card .mc-icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px}
.more-card .mc-title{font-size:15px;font-weight:600}
.more-card .mc-desc{font-size:12.5px;color:var(--color-ink-muted);line-height:1.5}
.more-section-title{font-size:12px;font-weight:600;color:var(--color-ink-muted);text-transform:uppercase;letter-spacing:.05em;margin:var(--space-5) 0 var(--space-3)}

/* 闪卡 */
.flashcard-stage{flex:1;display:flex;flex-direction:column;padding:var(--space-5);max-width:var(--content-max);margin:0 auto;width:100%}
.flashcard-counter{text-align:center;font-size:13px;color:var(--color-ink-muted);margin-bottom:var(--space-4)}
.flashcard{flex:1;display:flex;align-items:center;justify-content:center;perspective:1200px;cursor:pointer}
.flashcard-inner{width:100%;min-height:280px;position:relative;transition:transform .6s var(--ease-out);transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--color-surface);border-radius:var(--radius-xl);box-shadow:0 4px 24px rgba(0,0,0,.08),0 0 0 1px var(--color-divider-soft);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-6);text-align:center}
.flashcard-face.back{transform:rotateY(180deg);background:var(--color-ai-msg)}
.flashcard-face .fc-label{font-size:11px;color:var(--color-ink-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;font-weight:600}
.flashcard-face .fc-content{font-size:19px;line-height:1.6;font-weight:500}
.flashcard-face.back .fc-content{font-family:var(--font-serif);font-size:17px}
.flashcard-actions{display:flex;gap:10px;padding-top:var(--space-5)}
.fc-grade{flex:1;padding:13px;border-radius:var(--radius-md);font-size:14px;font-weight:600;transition:all .15s}
.fc-grade:hover{transform:translateY(-1px)}
.fc-grade.again{background:var(--color-danger-soft);color:var(--color-danger)}
.fc-grade.hard{background:var(--color-warning-soft);color:var(--color-warning)}
.fc-grade.good{background:var(--color-success-soft);color:var(--color-success)}
.fc-grade.easy{background:var(--color-accent-soft);color:var(--color-accent)}
.flashcard-done{text-align:center;padding:var(--space-8) var(--space-5)}
.flashcard-done .fd-icon{font-size:48px;margin-bottom:20px}
.flashcard-done h2{font-size:22px;font-weight:700;margin-bottom:10px}
.flashcard-done p{font-size:15px;color:var(--color-ink-secondary);margin-bottom:var(--space-6);line-height:1.7}

/* 阅读 */
.reader{max-width:680px;margin:0 auto;padding:var(--space-6) var(--space-5)}
.reader-meta{font-size:13px;color:var(--color-ink-muted);margin-bottom:8px}
.reader h1.read-title{font-size:26px;font-weight:700;margin-bottom:var(--space-3);letter-spacing:-.01em;line-height:1.3}
.reader .read-body{font-family:var(--font-serif);font-size:17px;line-height:1.9;color:var(--color-ink-primary)}
.reader .read-body p{margin-bottom:var(--space-4)}
.reader .read-body .highlighted{background:linear-gradient(transparent 60%,rgba(255,159,10,.25) 60%);padding:0 2px;cursor:pointer;position:relative}
.reader .read-body .highlighted::after{content:'＋卡';position:absolute;top:-8px;right:-8px;background:var(--color-purple);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;place-items:center;font-family:var(--font-sans)}
.reader .read-body .highlighted:hover::after{display:grid}
.reader-ai-note{background:var(--color-ai-msg);border-radius:3px var(--radius-md) var(--radius-md) var(--radius-md);padding:var(--space-4);margin:var(--space-5) 0;font-family:var(--font-sans);font-size:14.5px;line-height:1.7;animation:msgIn .4s var(--ease-out)}
.reader-ai-note .ran-head{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-ink-muted);margin-bottom:8px;font-weight:600}

/* 语音 */
.voice-room{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-6);text-align:center}
.voice-orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--color-accent),var(--color-accent-hover));display:grid;place-items:center;margin-bottom:var(--space-6);position:relative;transition:all .3s}
.voice-orb::before,.voice-orb::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--color-accent);opacity:0}
.voice-orb.speaking::before{animation:voiceRing 1.8s infinite}
.voice-orb.speaking::after{animation:voiceRing 1.8s infinite .6s}
@keyframes voiceRing{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}
.voice-orb .vo-icon{font-size:48px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))}
.voice-status{font-size:16px;font-weight:600;margin-bottom:6px}
.voice-hint{font-size:13px;color:var(--color-ink-muted);margin-bottom:var(--space-5)}
.voice-wave{display:flex;align-items:center;gap:3px;height:32px;margin-bottom:var(--space-5)}
.voice-wave span{width:3px;background:var(--color-accent);border-radius:2px}
.voice-wave.idle span{height:4px;opacity:.3}
.voice-wave.active span{animation:waveBar .9s infinite var(--ease-out)}
@keyframes waveBar{0%,100%{height:6px}50%{height:28px}}
.voice-transcript{max-width:420px;width:100%;text-align:left;background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-4);margin-bottom:var(--space-4);min-height:80px;box-shadow:0 0 0 1px var(--color-divider-soft)}
.voice-transcript .vt-line{font-size:14px;line-height:1.6;margin-bottom:8px}
.voice-transcript .vt-line.ai strong{color:var(--color-accent)}
.voice-transcript .vt-line.user strong{color:var(--color-ink-secondary)}
.voice-controls{display:flex;gap:12px}
.voice-btn{padding:12px 24px;border-radius:var(--radius-full);font-size:14px;font-weight:600;transition:all .15s}
.voice-btn.primary{background:var(--color-accent);color:#fff}.voice-btn.primary:hover{background:var(--color-accent-hover)}
.voice-btn.ghost{background:var(--color-surface);color:var(--color-ink-secondary);box-shadow:inset 0 0 0 1.5px var(--color-divider)}
.voice-quick{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:420px;margin-top:var(--space-3)}

/* 画布 */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--color-page-secondary);background-image:radial-gradient(circle,var(--color-divider) 1px,transparent 1px);background-size:24px 24px}
.canvas-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.canvas-svg path{stroke:var(--color-ink-muted);stroke-width:1.5;fill:none;stroke-dasharray:4 3}
.canvas-node{position:absolute;background:var(--color-surface);border-radius:var(--radius-md);padding:12px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08),0 0 0 1px var(--color-divider);cursor:grab;min-width:120px;transition:box-shadow .15s,transform .1s;user-select:none}
.canvas-node:hover{box-shadow:0 4px 20px rgba(0,0,0,.12),0 0 0 1.5px var(--color-accent)}
.canvas-node:active{cursor:grabbing}
.canvas-node .cn-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.canvas-node .cn-icon{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:13px}
.canvas-node .cn-title{font-size:13px;font-weight:600}
.canvas-node .cn-sub{font-size:11.5px;color:var(--color-ink-muted)}
.canvas-node.linked{border-left:3px solid var(--color-accent)}
.canvas-node.new-node{animation:nodePop .4s var(--ease-spring);border-color:var(--color-success)}
@keyframes nodePop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.canvas-add{position:absolute;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--color-accent);color:#fff;display:grid;place-items:center;font-size:26px;box-shadow:0 4px 16px var(--color-accent-glow);z-index:5;transition:transform .15s}
.canvas-add:hover{transform:scale(1.08)}
.canvas-hint{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.85);color:#fff;padding:7px 14px;border-radius:var(--radius-full);font-size:12px;backdrop-filter:blur(10px)}

/* 手写 */
.handwrite-pad{flex:1;background:var(--color-surface);position:relative;overflow:hidden}
#handwrite-canvas{width:100%;height:100%;touch-action:none;cursor:crosshair;display:block}
.handwrite-tools{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.9);border-radius:var(--radius-full);padding:6px;display:flex;gap:4px;backdrop-filter:blur(10px)}
.hw-tool{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#c7c7cc;transition:all .15s}
.hw-tool:hover{background:rgba(255,255,255,.1);color:#fff}
.hw-tool.active{background:var(--color-accent);color:#fff}
.hw-color{width:24px;height:24px;border-radius:50%;border:2px solid #fff}

/* 文件 */
.file-list{padding:var(--space-4) var(--space-5);max-width:var(--content-max);margin:0 auto}
.file-item{display:flex;align-items:center;gap:14px;background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-4);margin-bottom:10px;box-shadow:0 0 0 1px var(--color-divider-soft);transition:all .15s}
.file-item:hover{box-shadow:0 0 0 1.5px var(--color-divider-hover);transform:translateY(-1px)}
.file-item .fi-icon{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:20px;flex-shrink:0}
.file-item .fi-name{font-size:14.5px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item .fi-meta{font-size:12px;color:var(--color-ink-muted)}

/* 番茄 */
.pomo-wrap{padding:var(--space-5);max-width:var(--content-max);margin:0 auto}
.pomo-timer{text-align:center;padding:var(--space-6) 0}
.pomo-clock{width:200px;height:200px;border-radius:50%;margin:0 auto var(--space-5);position:relative;background:var(--color-surface);box-shadow:0 0 0 1px var(--color-divider-soft),0 8px 32px rgba(0,0,0,.06);display:grid;place-items:center}
.pomo-progress-ring{position:absolute;inset:0;transform:rotate(-90deg)}
.pomo-progress-ring circle{fill:none;stroke-width:6}
.pomo-progress-ring .track{stroke:var(--color-divider-soft)}
.pomo-progress-ring .bar{stroke:var(--color-accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.pomo-time{font-size:40px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.pomo-label{font-size:13px;color:var(--color-ink-muted);margin-top:4px}
.pomo-controls{display:flex;gap:10px;justify-content:center}
.task-list-title{font-size:13px;font-weight:600;color:var(--color-ink-muted);text-transform:uppercase;letter-spacing:.05em;margin:var(--space-5) 0 var(--space-3)}
.task-item{display:flex;align-items:center;gap:12px;background:var(--color-surface);border-radius:var(--radius-md);padding:14px var(--space-4);margin-bottom:8px;box-shadow:0 0 0 1px var(--color-divider-soft)}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--color-divider);flex-shrink:0;display:grid;place-items:center;transition:all .15s;cursor:pointer}
.task-check.done{background:var(--color-accent);border-color:var(--color-accent)}
.task-check.done svg{display:block}
.task-check svg{display:none;width:13px;height:13px;color:#fff}
.task-item.done .task-text{text-decoration:line-through;color:var(--color-ink-muted)}
.task-text{flex:1;font-size:14.5px}
.task-tag{font-size:11px;padding:3px 8px;border-radius:var(--radius-full);background:var(--color-accent-soft);color:var(--color-accent);font-weight:600}

/* 偏好 */
.pref-group{background:var(--color-surface);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 0 0 1px var(--color-divider-soft);margin-bottom:var(--space-4)}
.pref-row2{display:flex;justify-content:space-between;align-items:center;padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--color-divider-soft)}
.pref-row2:last-child{border-bottom:none}
.pref-row2 .pr-label{font-size:15px}
.toggle{width:44px;height:26px;border-radius:var(--radius-full);background:var(--color-divider);position:relative;transition:background .2s;cursor:pointer}
.toggle.on{background:var(--color-success)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s var(--ease-spring);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(18px)}
.quote-source-card{display:flex;align-items:flex-start;gap:10px;padding:var(--space-4);background:var(--color-surface);border-radius:var(--radius-md);margin-bottom:8px;box-shadow:0 0 0 1px var(--color-divider-soft)}
.quote-source-card .qs-icon{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
.quote-source-card .qs-name{font-size:14px;font-weight:600;margin-bottom:2px}
.quote-source-card .qs-desc{font-size:12px;color:var(--color-ink-muted)}

/* Growth / Profile */
.page-title{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:var(--space-5)}
.growth-narrative{font-size:17px;line-height:1.7;font-family:var(--font-serif);padding:var(--space-5);background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:0 0 0 1px var(--color-divider-soft);margin-bottom:var(--space-6)}
.timeline{display:flex;flex-direction:column;gap:var(--space-3)}
.timeline-item{background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-4);box-shadow:0 0 0 1px var(--color-divider-soft);animation:msgIn .3s var(--ease-out)}
.timeline-item.new-item{box-shadow:0 0 0 1.5px var(--color-accent),0 4px 14px var(--color-accent-glow)}
.timeline-item .ti-time{font-size:12px;color:var(--color-ink-muted);margin-bottom:6px}
.timeline-item .ti-title{font-size:15px;font-weight:600;margin-bottom:4px}
.timeline-item .ti-summary{font-size:14px;color:var(--color-ink-secondary);line-height:1.6}
.profile-mirror{font-family:var(--font-serif);font-size:17px;line-height:1.85;padding:var(--space-5);background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:0 0 0 1px var(--color-divider-soft);margin-bottom:var(--space-6)}
.profile-mirror .highlight{background:linear-gradient(transparent 60%,var(--color-accent-soft) 60%);padding:0 2px}
.profile-section{margin-bottom:var(--space-5)}
.profile-section h3{font-size:13px;font-weight:600;color:var(--color-ink-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--space-3)}
.pref-grid{display:flex;flex-direction:column;gap:10px}
.pref-row{display:flex;justify-content:space-between;align-items:center;background:var(--color-surface);padding:var(--space-4);border-radius:var(--radius-md);box-shadow:0 0 0 1px var(--color-divider-soft)}
.pref-row .pref-label{font-size:14px;color:var(--color-ink-secondary)}
.pref-row .pref-value{font-size:14px;font-weight:600}

@media(max-width:480px){
  #app{padding:72px var(--space-3) var(--space-5)}
  .today-greeting{font-size:26px}.stage-center .ai-quote{font-size:17px}.finish-hero .ai-quote{font-size:19px}
  .demo-chip{padding:4px 9px;font-size:11px}.demo-bar-label{padding:0 4px}.btn-lg{padding:14px 30px;font-size:15px}
  #bottom-nav{gap:var(--space-3)}.nav-tab{min-width:50px;padding:8px 6px}
}
.fade-in{animation:fadeIn .4s var(--ease-out)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- 演示控制条:学科 + 时间维度 + 情景 -->
<div id="demo-bar">
  <button class="demo-bar-toggle" id="bar-toggle">▾</button>
  <div class="demo-bar-content">
    <span class="demo-bar-label">学科</span>
    <button class="demo-chip active" data-subject="linear">线代</button>
    <button class="demo-chip" data-subject="recursion">递归</button>
    <span class="demo-bar-divider"></span>
    <span class="demo-bar-label">时间</span>
    <button class="demo-chip active" data-era="week1">第一周</button>
    <button class="demo-chip" data-era="month1">一个月</button>
    <button class="demo-chip" data-era="month3">三个月</button>
    <span class="demo-bar-divider"></span>
    <span class="demo-bar-label">情景</span>
    <button class="demo-chip active" data-scene="continue">继续昨天</button>
    <button class="demo-chip" data-scene="return">中断回来</button>
  </div>
</div>

<main id="app"></main>

<!-- Session 覆盖层 -->
<div id="session-overlay">
  <div class="session-topbar">
    <button class="session-back" id="session-back"><svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <div class="session-title" id="session-title">学习</div>
    <button class="session-tools-trigger" id="tools-trigger" title="学习工具">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M14.7 6.3a4 4 0 00-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 005.4-5.4l-2.5 2.5-2-2 2.5-2.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span class="nudge" id="tool-nudge">1</span>
      <span class="pomodoro-badge" id="pomo-badge"></span>
    </button>
    <div class="session-stages" id="session-stages"></div>
  </div>
  <div class="session-progress"><div class="session-progress-fill" id="progress-fill"></div></div>
  <div class="session-body" id="session-body"></div>
</div>

<div class="tool-tray-menu" id="tool-tray-menu"></div>
<div id="tool-page-host"></div>

<nav id="bottom-nav">
  <button class="nav-tab active" data-page="today"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Today</span></button>
  <button class="nav-tab" data-page="growth"><svg viewBox="0 0 24 24" fill="none"><path d="M3 17l6-6 4 4 8-8M14 7h7v7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Growth</span></button>
  <button class="nav-tab" data-page="profile"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>Profile</span></button>
  <button class="nav-tab" data-page="more"><svg viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="18" cy="12" r="2" stroke="currentColor" stroke-width="1.8"/></svg><span>更多</span></button>
</nav>

<script>
/* ═══════════════════════════════════════════════════════════════
   活记忆引擎 (核心) —— 苹果果对你的理解,会真实演化
   ═══════════════════════════════════════════════════════════════ */

// 时间维度的记忆模板:不同时期,苹果果理解你的深度不同
const ERA_MEMORY = {
  week1: {
    label: '第一周',
    sessionsDone: 2,
    streakWeeks: 1,
    topics: { '矩阵': { mastery: 0.25, visits: 2, status: '刚开始' }, '矩阵乘法': { mastery: 0.15, visits: 1, status: '新朋友' } },
    mood: '好奇', pressure: 0.2,
    insights: [],
    growthHistory: [
      { time: '3 天前', title: '第一次学习', summary: '你打开了苹果果，从矩阵的基本概念开始。' },
      { time: '昨天', title: '矩阵的定义', summary: '你理解了矩阵就是一组数的排列。' }
    ]
  },
  month1: {
    label: '一个月',
    sessionsDone: 9,
    streakWeeks: 4,
    topics: { '矩阵': { mastery: 0.7, visits: 6, status: '比较熟了' }, '矩阵乘法': { mastery: 0.55, visits: 4, status: '正在巩固' }, '矩阵求逆': { mastery: 0.2, visits: 1, status: '新朋友' } },
    mood: '稳定', pressure: 0.35,
    insights: ['你对矩阵运算的感觉在变——从觉得抽象，到能自己算出来。', '你更喜欢先动手算一遍，再回来看定义。'],
    growthHistory: [
      { time: '4 周前', title: '矩阵的基本概念', summary: '你第一次接触矩阵。' },

/* ═══════════════════════════════════════════════════════════════
   记忆更新(活记忆核心)
   ═══════════════════════════════════════════════════════════════ */
function updateMemoryFromPractice(correct) {
  const topic = state.subject==='linear'?'矩阵乘法':'递归';
  if (!mem.topics[topic]) mem.topics[topic] = { mastery:0.1, visits:1, status:'新朋友' };
  mem.topics[topic].mastery = Math.min(0.95, mem.topics[topic].mastery + (correct?0.08:0.02));
  mem.topics[topic].visits = (mem.topics[topic].visits||0) + 1;
  // 状态叙事更新
  const m = mem.topics[topic].mastery;
  mem.topics[topic].status = m<0.3?'新朋友':m<0.6?'正在巩固':m<0.85?'比较熟了':'很稳';
  if (!correct) mem.pressure = Math.min(0.7, mem.pressure + 0.05);
}
function updateMemoryFromSession() {
  const topic = state.subject==='linear'?'矩阵乘法':'递归';
  if (!mem.topics[topic]) mem.topics[topic] = { mastery:0.15, visits:0, status:'新朋友' };
  mem.topics[topic].visits = (mem.topics[topic].visits||0) + 1;
  mem.sessionsDone = (mem.sessionsDone||0) + 1;
  // 加一条新的 growth 记录(真实出现在 Growth 页)
  const newRecord = {
    time: '刚才',
    title: state.subject==='linear' ? '矩阵乘法的练习' : '用斐波那契理解递归',
    summary: state.subject==='linear' ? '你把行×列的规则亲手算了一遍。' : '你亲手算出了 fib(5)。'
  };
  // 避免重复加
  if (!mem.growthHistory.find(g => g.time === '刚才')) mem.growthHistory.unshift(newRecord);
}

      <div class="voice-controls">
        <button class="voice-btn primary" id="voice-toggle" onclick="toggleVoice()">开始对话</button>
        <button class="voice-btn ghost" onclick="closeToolPage()">结束</button>
      </div>
      <div class="voice-quick" id="voice-quick" style="display:none">
        <button class="suggestion-pill" onclick="voiceReply('我想介绍一下我自己')">介绍我自己</button>
        <button class="suggestion-pill" onclick="voiceReply('今天天气怎么样')">聊聊天气</button>
        <button class="suggestion-pill" onclick="voiceReply('我最近在学线性代数')">说说在学什么</button>
      </div>
    </div>`;
}
function toggleVoice() {
  state.voice.speaking = !state.voice.speaking;
  const orb=document.getElementById('voice-orb'), wave=document.getElementById('voice-wave'), status=document.getElementById('voice-status'), hint=document.getElementById('voice-hint'), btn=document.getElementById('voice-toggle'), quick=document.getElementById('voice-quick');
  if (state.voice.speaking) {
    orb.classList.add('speaking'); wave.classList.remove('idle'); wave.classList.add('active');
    status.textContent='苹果果在说……'; hint.textContent='它在等你接话'; btn.textContent='我说一句'; quick.style.display='flex';
    appendVoiceLine('ai', 'Hello. Tell me, what are you studying these days?');
  } else {
    orb.classList.remove('speaking'); wave.classList.add('idle'); wave.classList.remove('active');
    status.textContent='暂停了'; hint.textContent='点按钮继续'; btn.textContent='继续对话';
  }
}
function voiceReply(text) {
  appendVoiceLine('user', text);
  const replies = { '我想介绍一下我自己':'Nice. It takes courage to introduce yourself in a new language. Where are you from?','今天天气怎么样':'Good icebreaker. Do you prefer sunny or rainy days when you study?','我最近在学线性代数':'Linear algebra. What part feels hardest right now?' };
  setTimeout(() => appendVoiceLine('ai', replies[text]||'Interesting. Tell me more.'), 800);
}
function appendVoiceLine(role, text) {
  const t=document.getElementById('voice-transcript'); const l=document.createElement('div'); l.className='vt-line '+role;
  l.innerHTML = role==='ai' ? `<strong>苹果果：</strong>${escapeHtml(text)}` : `<strong>你：</strong>${escapeHtml(text)}`;
  t.appendChild(l); t.scrollTop=t.scrollHeight;
}

function initCanvas() {

      <div class="canvas-hint">拖动节点重新摆 · 点 ＋ 添加</div>
      <svg class="canvas-svg"><path d="M120,70 C180,100 200,140 220,170" /><path d="M110,230 C160,200 200,180 220,180" /></svg>
      ${d.canvasStarterNodes.map((n,i)=>`<div class="canvas-node ${n.linked?'linked':''}" data-id="n${i}" style="left:${30+i*160}px;top:${50+i*100}px"><div class="cn-head"><div class="cn-icon" style="background:${n.ic}">${n.icon}</div><div class="cn-title">${n.title}</div></div><div class="cn-sub">${n.sub}</div></div>`).join('')}
      <div class="canvas-node linked" data-id="nlink" style="left:50px;top:280px"><div class="cn-head"><div class="cn-icon" style="background:var(--color-teal-soft)">🔗</div><div class="cn-title">昨天的学习</div></div><div class="cn-sub">链接到 Session</div></div>
      <button class="canvas-add" onclick="addCanvasNode()">＋</button>
    </div>`;
  enableCanvasDrag();
}
let canvasCount = 10;
function addCanvasNode() {
  const wrap = document.getElementById('canvas-full');
  const n = document.createElement('div'); n.className='canvas-node new-node'; n.dataset.id='n'+(++canvasCount);
  n.style.left=(60+Math.random()*200)+'px'; n.style.top=(60+Math.random()*200)+'px';
  n.innerHTML=`<div class="cn-head"><div class="cn-icon" style="background:var(--color-divider-soft)">✨</div><div class="cn-title">新概念</div></div><div class="cn-sub">点我编辑</div>`;
  wrap.appendChild(n); enableCanvasDrag();
}
function enableCanvasDrag() {
  document.querySelectorAll('#canvas-full .canvas-node').forEach(node => {
    if (node.dataset.bound) return; node.dataset.bound='1';
    let sx,sy,ox,oy,drag=false;
    const down=(e)=>{drag=true;const p=pt(e);sx=p.x;sy=p.y;ox=parseInt(node.style.left);oy=parseInt(node.style.top);e.preventDefault();};
    const move=(e)=>{if(!drag)return;const p=pt(e);node.style.left=(ox+p.x-sx)+'px';node.style.top=(oy+p.y-sy)+'px';};
    const up=()=>{drag=false;};
    node.addEventListener('mousedown',down); node.addEventListener('touchstart',down,{passive:false});
    document.addEventListener('mousemove',move); document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('mouseup',up); document.addEventListener('touchend',up);
  });
}
function pt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}

/* 手写 */
let hwCtx,hwDrawing=false,hwLast;
function initHandwrite() {
  document.getElementById('tp-title').textContent='手写演算';
  document.getElementById('tp-body').innerHTML=`<div class="handwrite-pad"><canvas id="handwrite-canvas"></canvas><div class="handwrite-tools"><button class="hw-tool active" onclick="setHwColor(this,'1c1c1e')"><span class="hw-color" style="background:#1c1c1e"></span></button><button class="hw-tool" onclick="setHwColor(this,'0a84ff')"><span class="hw-color" style="background:#0a84ff"></span></button><button class="hw-tool" onclick="setHwColor(this,'ff3b30')"><span class="hw-color" style="background:#ff3b30"></span></button><button class="hw-tool" onclick="clearHw()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div></div>`;
  setTimeout(()=>{
    const c=document.getElementById('handwrite-canvas');if(!c)return;
    const rz=()=>{c.width=c.offsetWidth;c.height=c.offsetHeight;};rz();
    hwCtx=c.getContext('2d');hwCtx.lineCap='round';hwCtx.lineJoin='round';hwCtx.lineWidth=2.5;hwCtx.strokeStyle='#1c1c1e';
    const p=(e)=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
    c.addEventListener('mousedown',e=>{hwDrawing=true;hwLast=p(e);e.preventDefault();});
    c.addEventListener('touchstart',e=>{hwDrawing=true;hwLast=p(e);e.preventDefault();},{passive:false});
    c.addEventListener('mousemove',e=>{if(!hwDrawing)return;const cur=p(e);hwCtx.beginPath();hwCtx.moveTo(hwLast.x,hwLast.y);hwCtx.lineTo(cur.x,cur.y);hwCtx.stroke();hwLast=cur;e.preventDefault();});
    c.addEventListener('touchmove',e=>{if(!hwDrawing)return;const cur=p(e);hwCtx.beginPath();hwCtx.moveTo(hwLast.x,hwLast.y);hwCtx.lineTo(cur.x,cur.y);hwCtx.stroke();hwLast=cur;e.preventDefault();},{passive:false});
    c.addEventListener('mouseup',()=>{hwDrawing=false;});c.addEventListener('touchend',()=>{hwDrawing=false;});
    window.addEventListener('resize',rz);
  },50);
}
function setHwColor(btn,color){document.querySelectorAll('.hw-tool').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(hwCtx)hwCtx.strokeStyle='#'+color;}
function clearHw(){const c=document.getElementById('handwrite-canvas');if(c&&hwCtx)hwCtx.clearRect(0,0,c.width,c.height);}

/* 番茄钟 */
let pomoTimer;
function initPomodoro() {
  document.getElementById('tp-title').textContent='番茄钟 · 今日规划';
  renderPomodoro();
}
function renderPomodoro() {
  const total=25*60, remain=state.pomo.seconds, offset=565.48*(1-remain/total);
  const mm=String(Math.floor(remain/60)).padStart(2,'0'), ss=String(remain%60).padStart(2,'0');
  document.getElementById('tp-body').innerHTML=`
    <div class="pomo-wrap fade-in">
      <div class="pomo-timer">
        <div class="pomo-clock">
          <svg class="pomo-progress-ring" viewBox="0 0 200 200"><circle class="track" cx="100" cy="100" r="90"></circle><circle class="bar" cx="100" cy="100" r="90" stroke-dasharray="565.48" stroke-dashoffset="${offset}"></circle></svg>
          <div><div class="pomo-time">${mm}:${ss}</div><div class="pomo-label">${state.pomo.running?'专注中':'准备专注'}</div></div>
        </div>
        <div class="pomo-controls"><button class="btn btn-primary" onclick="togglePomo()">${state.pomo.running?'暂停':'开始 25 分钟'}</button><button class="btn btn-outline" onclick="resetPomo()">重置</button></div>
      </div>
      <div class="task-list-title">今天的安排</div>
      <div id="task-list">${state.tasks.map((t,i)=>`<div class="task-item ${t.done?'done':''}"><div class="task-check ${t.done?'done':''}" onclick="toggleTask(${i})"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="task-text">${t.text}</div><span class="task-tag">${t.tag}</span></div>`).join('')}</div>
    </div>`;
}
function toggleTask(i){state.tasks[i].done=!state.tasks[i].done;document.getElementById('task-list').innerHTML=state.tasks.map((t,i)=>`<div class="task-item ${t.done?'done':''}"><div class="task-check ${t.done?'done':''}" onclick="toggleTask(${i})"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="task-text">${t.text}</div><span class="task-tag">${t.tag}</span></div>`).join('');}
function togglePomo() {
  state.pomo.running=!state.pomo.running;
  const badge=document.getElementById('pomo-badge');
  if(state.pomo.running){badge.classList.add('running');pomoTimer=setInterval(()=>{state.pomo.seconds--;if(state.pomo.seconds<=0){state.pomo.seconds=25*60;state.pomo.running=false;clearInterval(pomoTimer);badge.classList.remove('running');}updatePomoDisplay();},1000);}
  else{clearInterval(pomoTimer);badge.classList.remove('running');}
  updatePomoDisplay();
  const btn=document.querySelector('.pomo-controls .btn-primary');if(btn)btn.textContent=state.pomo.running?'暂停':'开始 25 分钟';
}
function updatePomoDisplay(){const total=25*60,remain=state.pomo.seconds,offset=565.48*(1-remain/total);const mm=String(Math.floor(remain/60)).padStart(2,'0'),ss=String(remain%60).padStart(2,'0');const t=document.querySelector('.pomo-time');if(t)t.textContent=`${mm}:${ss}`;const b=document.querySelector('.pomo-progress-ring .bar');if(b)b.style.strokeDashoffset=offset;const l=document.querySelector('.pomo-label');if(l)l.textContent=state.pomo.running?'专注中':'准备专注';}
function resetPomo(){state.pomo.running=false;state.pomo.seconds=25*60;clearInterval(pomoTimer);document.getElementById('pomo-badge').classList.remove('running');renderPomodoro();}

/* ═══════════════════════════════════════════════════════════════
   通用
   ═══════════════════════════════════════════════════════════════ */
function navigateTo(page){state.page=page;document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.page===page));renderPage();}
function renderPage(){if(state.session.active)return;({today:renderToday,growth:renderGrowth,profile:renderProfile,more:renderMore}[state.page]||renderToday)();}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showToast(msg){
  const t=document.createElement('div');t.textContent=msg;
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.92);color:#fff;padding:10px 18px;border-radius:9999px;font-size:13px;z-index:500;backdrop-filter:blur(10px);animation:msgIn .3s var(--ease-out)';
  document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2200);
}
