<!DOCTYPE html>
<html lang="zh-CN">

<html>
<meta name="viewport"
  content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />

<head>
  <title>Menu~导航</title>
</head>

<head>
  <meta charset="utf-8">
  <style type="text/css">
    .button {
      display: inline-block;
      border-radius: 10px;
      background-color: #00ffb3;
      border: 2px;
      border-style: groove;
      color: #ff8e8e;
      text-align: center;
      font-size: 28px;
      padding: 20px;
      width: 180px;
      transition: all 0.5s;
      cursor: pointer;
      margin: 15px;
    }

    .button span {
      cursor: pointer;
      display: inline-block;
      position: relative;
      transition: 0.5s;
    }

    .button span:after {
      content: '»';
      position: absolute;
      opacity: 0;
      top: 0;
      right: -20px;
      transition: 0.5s;
    }

    .button:hover span {
      padding-right: 25px;
    }

    .button:hover span:after {
      opacity: 1;
      right: 0;
    }

    .h1 {
      width: 88%;
      height: 60px;
      color: white;
      border: 3px;
      border-radius: 10px;
      border-style: solid;
      border-color: rgb(255, 0, 179);
      background-color: rgb(255, 145, 0);
      text-align: center;
      line-height: 60px;
      margin-top: auto;
      margin-left: auto;
      margin-right: auto;
    }

    .bg {
      background: url('assets/img/menu.jpg');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      height: 100%;
      width: 100%;
      text-align: center;
      line-height: 100%;
    }

    .a {
      color: #ff8e8e;
      text-decoration: none;
    }

    .caihong {
      background-image: -webkit-linear-gradient(left, #00fff1, #2bff00 25%, #00fff1 50%, #2bff00 75%, #00fff1);
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      -webkit-background-size: 200% 100%;
      -webkit-animation: maskedAnimation 4s infinite linear;
      font-size: 16px;
      border: #808080;
      border: 3px;
      border-color: calc(1px);
      border-radius: 9px;
      border-style: ridge;
      margin-left: auto;
      margin-right: auto;
      width: 360px;
      text-align: center;
      line-height: 25px;
    }

    @keyframes maskedAnimation {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: -100% 0;
      }
    }
  </style>
</head>

<div class="bg">
  <div>

    <br>

  </div>
</div>
