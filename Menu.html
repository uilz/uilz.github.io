<!DOCTYPE html>
<html lang="en">

<html>
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<head>
  <title>Menu~导航</title>
</head>

<head>
  <meta charset="utf-8">
  <style type="text/css">
    .button {
      display: inline-block;
      border-radius: 10px;
      background-color: #00ffb3;
      border: none;
      color: #808080;
      text-align: center;
      font-size: 28px;
      padding: 20px;
      width: 180px;
      transition: all 0.5s;
      cursor: pointer;
      margin: 5px;
    }

    .button span {
      cursor: pointer;
      display: inline-block;
      position: relative;
      transition: 0.5s;
    }

    .button span:after {
      content: '»';
      position: absolute;
      opacity: 0;
      top: 0;
      right: -20px;
      transition: 0.5s;
    }

    .button:hover span {
      padding-right: 25px;
    }

    .button:hover span:after {
      opacity: 1;
      right: 0;
    }

    .h1 {
      width: 160px;
      height: 65px;
      color: white;
      border: 3px;
      border-radius: 100px;
      border-style: double;
      border-color: rgb(255, 255, 255);
      background-color: rgb(255, 145, 0);
      text-align: center;
      line-height: 60px;
      margin-top: auto;
      margin-left: auto;
      margin-right: auto;
    }

    .bg {
      background: url('0img/menu.jpg');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      height: 100%;
      width: 100%;
      text-align: center;
      line-height: 100%;
      z-index: 1;
    }

    .a {
      color: #555555;
      text-decoration: none;
    }

    .caihong {
      background-image: -webkit-linear-gradient(left, #ff3fff, #2bff00 25%, #ff3fff 50%, #2bff00 75%, #ff3fdf );
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      -webkit-background-size: 200% 100%;
      -webkit-animation: maskedAnimation 4s infinite linear;
      font-size: 18px;
    }

    @keyframes maskedAnimation {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: -100% 0;
      }
    }
  </style>
</head>

<div class="bg">
  <div>
    <br>
    <h1 class="h1">小 菜 单</h1>
    <hr>
    <button class="button"><span><a class="a" href=" https://opliu.github.io/index.html">主 页</a></span></button>
    <br>
    <button class="button"><span><a class="a" href=" https://opliu.github.io/Boom.html">扫 雷</a></span></button>
    <br>

    <br>
    <button class="button"><span><a class="a" href=" https://opliu.github.io/fan.html">吹风扇</a></span></button>
    <br>
    <button class="button"><span><a class="a" href=" https://opliu.github.io/WoodFish.html">攒功德</a></span></button>
    <br>
    <button class="button"><span><a class="a" href=" https://space.bilibili.com/14229967">好康的</a></span></button>
    <h5 class="caihong">建议保存本站，长期更新！</h5>
  </div>
</div>

</html>
